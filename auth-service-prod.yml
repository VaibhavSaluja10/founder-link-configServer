# Auth Service - Production Profile
spring:
  datasource:
    url: jdbc:mysql://prod-db-server:3306/founderlink_auth?createDatabaseIfNotExist=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  expirationMs: 1800000

logging:
  level:
    org.capgemini: WARN
    org.springframework.security: WARN
